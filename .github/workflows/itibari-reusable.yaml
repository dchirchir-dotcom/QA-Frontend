name: Reusable workflow sample

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: false
        default: ""

      shardIndex:
        type: string
        required: true

      shardTotal:
        type: string
        required: true

      environment:
        type: string
        required: true

      testURL:
        type: string
        required: false

      use-cache:
        type: boolean
        default: true

      node-version:
        type: string
        default: "20.x"

    secrets:
      ADMIN_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: false

env:
  WORK_DIR: ./uitests

jobs:
  Run-UI-Tests:
    name: Run Playwright tests for ${{ inputs.tag }} - Shard ${{ inputs.shardIndex }}/${{ inputs.shardTotal }}

    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.45.2-jammy

    defaults:
      run:
        working-directory: ${{ env.WORK_DIR }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ env.WORK_DIR }}/package-lock.json

      - name: Calculate cache key
        id: cache-key
        run: echo "CACHE_KEY=deps-${{ hashFiles('**/package-lock.json') }}" >> $GITHUB_OUTPUT

      - name: Cache node modules
        if: ${{ inputs.use-cache == true }}
        uses: actions/cache@v4
        with:
          path: ${{ env.WORK_DIR }}/node_modules
          key: ${{ steps.cache-key.outputs.CACHE_KEY }}

      - name: Install dependencies
        run: npm ci

      - name: Check Slack alert setup
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "Slack webhook is configured."
          else
            echo "::warning::SLACK_WEBHOOK_URL is not configured, so Slack alerts will not be sent."
          fi

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            npx playwright test \
              --grep "${{ inputs.tag }}" \
              --shard=${{ inputs.shardIndex }}/${{ inputs.shardTotal }}
          else
            npx playwright test \
              --shard=${{ inputs.shardIndex }}/${{ inputs.shardTotal }}
          fi

      - name: Send Slack failure alert
        if: steps.playwright.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ENVIRONMENT: ${{ inputs.environment }}
          TAG: ${{ inputs.tag }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::Skipping Slack alert because SLACK_WEBHOOK_URL is not configured."
            exit 0
          fi

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TEST_SCOPE="${TAG:-all tests}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Playwright UI tests failed for ${ENVIRONMENT} (${TEST_SCOPE}). View run: ${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL"

      - name: Fail workflow if Playwright failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ inputs.environment }}-${{ inputs.shardIndex }}
          path: |
            ${{ env.WORK_DIR }}/playwright-report/
            ${{ env.WORK_DIR }}/test-results/
