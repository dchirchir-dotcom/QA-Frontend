name: Reusable workflow sample

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true

      shardIndex:
        type: string
        required: true

      shardTotal:
        type: string
        required: true

      environment:
        type: string
        required: true

      testURL:
        type: string
        required: false

      use-cache:
        type: boolean
        default: true

      node-version:
        type: string
        default: "20.x"

    secrets:
      ADMIN_TOKEN:
        required: true

env:
  WORK_DIR: ./apitests

jobs:
  Run-UI-Tests:
    name: Run Playwright tests for ${{ inputs.tag }} - Shard ${{ inputs.shardIndex }}/${{ inputs.shardTotal }}

    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.45.2-jammy

    defaults:
      run:
        working-directory: ${{ env.WORK_DIR }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Calculate cache key
        id: cache-key
        run: echo "CACHE_KEY=deps-${{ hashFiles('**/package-lock.json') }}" >> $GITHUB_OUTPUT

      - name: Cache node modules
        if: ${{ inputs.use-cache == true }}
        uses: actions/cache@v4
        with:
          path: ${{ env.WORK_DIR }}/node_modules
          key: ${{ steps.cache-key.outputs.CACHE_KEY }}

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          npx playwright test \
            --grep "${{ inputs.tag }}" \
            --shard=${{ inputs.shardIndex }}/${{ inputs.shardTotal }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ inputs.environment }}-${{ inputs.shardIndex }}
          path: |
            ${{ env.WORK_DIR }}/playwright-report/
            ${{ env.WORK_DIR }}/test-results/